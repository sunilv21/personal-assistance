<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
    <defs>
        <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#2563eb"/>
        </linearGradient>
    </defs>

    <!-- Sound waves left -->
    <path d="M16 26 q-4 6 0 12" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>
    <path d="M11 22 q-6 10 0 20" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>

    <!-- Sound waves right -->
    <path d="M48 26 q4 6 0 12" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>
    <path d="M53 22 q6 10 0 20" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>

    <!-- Microphone capsule -->
    <rect x="24" y="10" width="16" height="32" rx="8" fill="url(#g)"/>

    <!-- Sound lines inside mic -->
    <path d="M27 18 q5 -2 10 0" stroke="#fff" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.85"/>
    <path d="M27 24 q5 -2 10 0" stroke="#fff" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.85"/>
    <path d="M27 30 q5 -2 10 0" stroke="#fff" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.85"/>

    <!-- U-shape holder + stand -->
    <path d="M20 32 v4 a12 12 0 0 0 24 0 v-4" stroke="url(#g)" stroke-width="3" stroke-linecap="round" fill="none"/>
    <line x1="32" y1="48" x2="32" y2="56" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>
    <line x1="24" y1="56" x2="40" y2="56" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>

    <!-- Orbit ring -->
    <ellipse cx="32" cy="50" rx="22" ry="5" stroke="url(#g)" stroke-width="2" fill="none" opacity="0.85"/>
    <circle cx="52" cy="51.5" r="1.6" fill="url(#g)"/>
</svg>
